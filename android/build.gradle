buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion    = 24
        compileSdkVersion = 35
        targetSdkVersion  = 35
        ndkVersion        = "27.1.12297006"
        kotlinVersion     = "2.0.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.7.3")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

// Must use plugins {} block (not legacy apply plugin:) for plugins resolved
// via includeBuild in pluginManagement — which is how RN ships its Gradle plugin.
plugins {
    id("com.facebook.react.rootproject")
}
