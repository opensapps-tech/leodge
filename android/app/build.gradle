apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * React Native build configuration.
 */
react {
    autolinkLibrariesWithApp()
}

android {
    ndkVersion        rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk        rootProject.ext.compileSdkVersion

    namespace "com.example.myapp"

    defaultConfig {
        applicationId   "com.example.myapp"
        minSdk          rootProject.ext.minSdkVersion
        targetSdk       rootProject.ext.targetSdkVersion
        versionCode     1
        versionName     "1.0.0"
    }

    signingConfigs {
        debug {
            storeFile     file('debug.keystore')
            storePassword 'android'
            keyAlias      'androiddebugkey'
            keyPassword   'android'
        }
        release {
            // CI: keystore injected from GitHub Secrets via env vars
            if (System.getenv("RELEASE_KEYSTORE_PATH")) {
                storeFile     file(System.getenv("RELEASE_KEYSTORE_PATH"))
                storePassword System.getenv("RELEASE_STORE_PASSWORD") ?: ""
                keyAlias      System.getenv("RELEASE_KEY_ALIAS") ?: ""
                keyPassword   System.getenv("RELEASE_KEY_PASSWORD") ?: ""
            } else {
                // Fallback to debug keystore if secrets not set
                storeFile     file('debug.keystore')
                storePassword 'android'
                keyAlias      'androiddebugkey'
                keyPassword   'android'
            }
        }
    }

    buildTypes {
        debug {
            debuggable          true
            signingConfig       signingConfigs.debug
            applicationIdSuffix ".debug"
        }
        release {
            signingConfig       signingConfigs.release
            minifyEnabled       false
            proguardFiles       getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    // Core React Native (version managed by RN Gradle Plugin)
    implementation("com.facebook.react:react-android")

    // WorkManager for reliable periodic widget updates
    implementation("androidx.work:work-runtime-ktx:2.9.0")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
